llm:
  model: inception/mercury-2
  utility_model: inception/mercury-2
  vision_model: google/gemini-2.0-flash-lite
  temperature: 0.3
  use_local_for: []
  local_model: llama3.1
  max_history_turns: 8
embedding:
  provider: gemini
  openai_model: text-embedding-3-small
  gemini_model: gemini-embedding-2-preview
  dimension: 3072
qdrant:
  host: localhost
  port: 6333
  collection: unmask_anatomy
pcr:
  threshold_low: 0.4
  threshold_high: 0.7
retrieval:
  top_k: 5
  use_bm25: true
  crag_max_retries: 2
session:
  rapport_cutoff_sec: 120
  assessment_cutoff_sec: 720
  wrapup_cutoff_sec: 840
  max_session_sec: 900
  diagnostic_questions: 4
  revisit_after_sec: 480
  revisit_cooldown_sec: 180
mastery:
  default_prior: 0.2
  correct_gain: 0.15
  incorrect_loss: 0.05
  weak_threshold: 0.4
  consecutive_correct_for_advance: 5
  consecutive_incorrect_for_hint: 2
