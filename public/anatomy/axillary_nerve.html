<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Axillary Nerve · animated</title>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Newsreader:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
<style>html,body{margin:0;padding:0;background:#fafaf7;font-family:"Inter Tight",system-ui,sans-serif;overflow:hidden}.frame{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;box-sizing:border-box}svg{width:100%;height:100%}.lbl{font-family:"Inter Tight",sans-serif;font-size:11.5px;fill:#222}.lbl-bold{font-family:"Inter Tight",sans-serif;font-size:12px;font-weight:700;fill:#1a1a1a}.lbl-tiny{font-family:"JetBrains Mono",monospace;font-size:9.5px;fill:#888;letter-spacing:.06em}.lbl-title{font-family:"Newsreader",Georgia,serif;font-style:italic;font-size:18px;fill:#1a1a1a;font-weight:500}.caption{font-family:"Newsreader",Georgia,serif;font-style:italic;font-size:13px;fill:#555}</style>
</head><body><div class="frame">
<svg viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet">
  <text x="500" y="34" class="lbl-title" text-anchor="middle">Axillary Nerve — C5 to C6, posterior cord</text>
  <text x="500" y="54" class="caption" text-anchor="middle">Through the quadrilateral space · powers deltoid abduction</text>

  <g transform="translate(180 100)">
    <!-- shoulder + arm -->
    <circle cx="80" cy="60" r="40" fill="#f0eadc" stroke="#1a1a1a" stroke-width="2"/>
    <text x="80" y="48" text-anchor="middle" class="lbl-tiny">shoulder</text>
    <!-- Quadrilateral space -->
    <rect x="55" y="70" width="50" height="36" rx="4" fill="none" stroke="#d49b3c" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="115" y="90" class="lbl-bold" fill="#d49b3c">Quadrilateral space</text>
    <!-- regimental badge area -->
    <ellipse cx="60" cy="140" rx="22" ry="30" fill="#f4d4c4" stroke="#1a1a1a" stroke-width="1" opacity="0.7"/>
    <text x="35" y="180" class="lbl-tiny" text-anchor="end" fill="#444">"regimental</text>
    <text x="35" y="192" class="lbl-tiny" text-anchor="end" fill="#444">badge" sensory</text>
    <!-- Arm (humerus) — animates abducting -->
    <g transform="translate(80 100)">
      <g>
        <animateTransform attributeName="transform" type="rotate" values="0;0;0;-80;-80;0" keyTimes="0;0.4;0.5;0.7;0.9;1" dur="8s" repeatCount="indefinite"/>
        <rect x="-15" y="0" width="30" height="180" rx="6" fill="#f0eadc" stroke="#1a1a1a" stroke-width="2"/>
        <!-- deltoid drape -->
        <path d="M -22 -10 C -30 30, -28 70, -10 80 L 10 80 C 28 70, 30 30, 22 -10 Z" fill="#c97070" opacity="0.65" stroke="#1a1a1a" stroke-width="1.2"/>
        <text x="0" y="44" text-anchor="middle" class="lbl-tiny" fill="#fff" font-weight="700">DELTOID</text>
      </g>
    </g>

    <!-- ROM arc -->
    <path d="M 80 280 A 180 180 0 0 0 -100 100" fill="none" stroke="#d8d8d2" stroke-width="1" stroke-dasharray="3 3"/>

    <!-- Axillary nerve path: into quadrilateral space, wrap around surgical neck -->
    <path id="ax" d="M 110 30 C 100 50, 90 70, 75 88 C 60 100, 55 110, 55 130 C 60 145, 70 150, 90 145"
          fill="none" stroke="#d49b3c" stroke-width="3" stroke-linecap="round" stroke-dasharray="220" stroke-dashoffset="220">
      <animate attributeName="stroke-dashoffset" values="220;220;0;0" keyTimes="0;0.05;0.4;1" dur="8s" repeatCount="indefinite"/>
    </path>
    <circle r="5" fill="#d49b3c">
      <animateMotion dur="8s" repeatCount="indefinite" keyTimes="0;0.05;0.4;1" keyPoints="0;0;1;1">
        <mpath href="#ax"/>
      </animateMotion>
    </circle>
  </g>

  <g transform="translate(540 100)">
    <text x="0" y="0" class="lbl-bold">Origin</text>
    <text x="0" y="20" class="lbl">Posterior cord (C5–C6)</text>

    <text x="0" y="56" class="lbl-bold">Motor</text>
    <text x="0" y="76" class="lbl">Deltoid (all 3 heads) → ABduction 15–90°</text>
    <text x="0" y="92" class="lbl">Teres minor → lateral rotation</text>

    <text x="0" y="128" class="lbl-bold">Sensory</text>
    <text x="0" y="148" class="lbl">Regimental badge area (lateral arm)</text>

    <g transform="translate(0 190)">
      <rect width="400" height="120" rx="5" fill="#fdf2dd" stroke="#d49b3c" stroke-width="1.5"/>
      <text x="14" y="22" class="lbl-bold" fill="#d49b3c">Injury risk</text>
      <text x="14" y="44" class="lbl">• Surgical neck of humerus fracture</text>
      <text x="14" y="62" class="lbl">• Anterior shoulder dislocation</text>
      <text x="14" y="80" class="lbl">• Quadrilateral space syndrome</text>
      <text x="14" y="102" class="lbl-bold" fill="#d49b3c">→ flat deltoid contour, lost ABduction</text>
    </g>
  </g>
  <text x="500" y="585" text-anchor="middle" class="caption">Quadrilateral space borders — teres minor, teres major, long head triceps, humerus</text>
</svg></div></body></html>
