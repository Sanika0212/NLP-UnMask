<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Radial Nerve · animated</title>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Newsreader:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
<style>html,body{margin:0;padding:0;background:#fafaf7;font-family:"Inter Tight",system-ui,sans-serif;overflow:hidden}.frame{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;box-sizing:border-box}svg{width:100%;height:100%}.lbl{font-family:"Inter Tight",sans-serif;font-size:11.5px;fill:#222}.lbl-bold{font-family:"Inter Tight",sans-serif;font-size:12px;font-weight:700;fill:#1a1a1a}.lbl-tiny{font-family:"JetBrains Mono",monospace;font-size:9.5px;fill:#888;letter-spacing:.06em}.lbl-title{font-family:"Newsreader",Georgia,serif;font-style:italic;font-size:18px;fill:#1a1a1a;font-weight:500}.caption{font-family:"Newsreader",Georgia,serif;font-style:italic;font-size:13px;fill:#555}</style>
</head><body><div class="frame">
<svg viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet">
  <text x="500" y="34" class="lbl-title" text-anchor="middle">Radial Nerve — C5 to T1, posterior cord</text>
  <text x="500" y="54" class="caption" text-anchor="middle">Spirals around the humerus · damage causes wrist drop</text>

  <g transform="translate(160 80)">
    <circle cx="60" cy="40" r="32" fill="#f0eadc" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M 38 65 L 28 220 L 92 220 L 82 65 Z" fill="#f0eadc" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Spiral groove highlight -->
    <ellipse cx="60" cy="140" rx="36" ry="14" fill="none" stroke="#3a6ea5" stroke-width="2" stroke-dasharray="3 3"/>
    <text x="105" y="138" class="lbl-bold" fill="#3a6ea5">Spiral groove</text>
    <text x="105" y="152" class="lbl-tiny">humerus mid-shaft</text>
    <!-- forearm with arm extended downward -->
    <path d="M 30 235 L 35 410 L 90 410 L 90 235 Z" fill="#f0eadc" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Hand: animated wrist drop -->
    <g transform="translate(60 410)">
      <g>
        <animateTransform attributeName="transform" type="rotate" values="0;0;0;0;-60;-60;0" keyTimes="0;0.4;0.55;0.65;0.75;0.95;1" dur="9s" repeatCount="indefinite"/>
        <path d="M -30 0 C -40 30, -38 60, -30 70 L 30 70 C 38 60, 40 30, 30 0 Z" fill="#f0eadc" stroke="#1a1a1a" stroke-width="2"/>
        <path d="M -32 12 C -52 22, -56 42, -44 52 L -28 42" fill="#f0eadc" stroke="#1a1a1a" stroke-width="2"/>
      </g>
    </g>

    <!-- Radial nerve path: spirals around humerus -->
    <path id="radial" d="M 60 60 C 80 80, 95 100, 90 130 C 85 160, 30 160, 25 190 C 22 215, 60 230, 65 280 L 70 410 L 78 460"
          fill="none" stroke="#3a6ea5" stroke-width="3" stroke-linecap="round" stroke-dasharray="600" stroke-dashoffset="600">
      <animate attributeName="stroke-dashoffset" values="600;600;0;0" keyTimes="0;0.05;0.45;1" dur="9s" repeatCount="indefinite"/>
    </path>
    <!-- pulse dot -->
    <circle r="5" fill="#3a6ea5">
      <animateMotion dur="9s" repeatCount="indefinite" keyTimes="0;0.05;0.45;1" keyPoints="0;0;1;1">
        <mpath href="#radial"/>
      </animateMotion>
    </circle>
  </g>

  <g transform="translate(500 90)">
    <text x="0" y="0" class="lbl-bold">Course (C5–T1)</text>
    <text x="0" y="22" class="lbl">Posterior cord → posterior to axillary artery</text>
    <text x="0" y="38" class="lbl">→ <tspan font-weight="700">spiral groove</tspan> of humerus (fracture risk)</text>
    <text x="0" y="54" class="lbl">→ bifurcates at lateral epicondyle into:</text>
    <text x="20" y="70" class="lbl">· superficial branch (sensory, dorsal hand)</text>
    <text x="20" y="86" class="lbl">· deep branch = PIN (extensors, supinator)</text>

    <text x="0" y="130" class="lbl-bold">Motor</text>
    <text x="0" y="150" class="lbl">All extensors of upper limb · BEST: triceps,</text>
    <text x="0" y="166" class="lbl">brachioradialis, ECRL/ECRB, EDC, EPL, EIP, APL</text>

    <text x="0" y="206" class="lbl-bold">Sensory</text>
    <text x="0" y="226" class="lbl">Lateral dorsal hand · 1st web space</text>

    <g transform="translate(0 270)" opacity="0">
      <animate attributeName="opacity" values="0;0;0;1;1" keyTimes="0;0.55;0.65;0.75;1" dur="9s" repeatCount="indefinite"/>
      <rect width="430" height="100" rx="5" fill="#d8e4f0" stroke="#3a6ea5" stroke-width="1.5"/>
      <text x="14" y="22" class="lbl-bold" fill="#3a6ea5">Wrist drop</text>
      <text x="14" y="44" class="lbl">Cause: humeral shaft fracture · "Saturday night palsy"</text>
      <text x="14" y="62" class="lbl">Loss: wrist + finger extension at MCP</text>
      <text x="14" y="80" class="lbl-bold" fill="#3a6ea5">Splint → cock-up (wrist extension)</text>
    </g>
  </g>
  <text x="500" y="585" text-anchor="middle" class="caption">Brachioradialis is first to recover — radial nerve regenerates ~1 mm/day</text>
</svg></div></body></html>
