<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Rotator Cuff · animated</title>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Newsreader:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#fafaf7;font-family:"Inter Tight",system-ui,sans-serif;overflow:hidden}
  .frame{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;box-sizing:border-box}
  svg{width:100%;height:100%}
  .lbl{font-family:"Inter Tight",sans-serif;font-size:11.5px;fill:#222}
  .lbl-bold{font-family:"Inter Tight",sans-serif;font-size:12px;font-weight:700;fill:#1a1a1a}
  .lbl-tiny{font-family:"JetBrains Mono",monospace;font-size:9.5px;fill:#888;letter-spacing:.06em}
  .lbl-title{font-family:"Newsreader",Georgia,serif;font-style:italic;font-size:18px;fill:#1a1a1a;font-weight:500}
  .caption{font-family:"Newsreader",Georgia,serif;font-style:italic;font-size:13px;fill:#555}
</style></head><body><div class="frame">
<svg viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet">
  <text x="500" y="34" class="lbl-title" text-anchor="middle">Rotator Cuff — SITS muscles cycle, each shows its action</text>
  <text x="500" y="54" class="caption" text-anchor="middle">Supraspinatus · Infraspinatus · Teres minor · Subscapularis</text>

  <!-- LEFT panel: scapula + humerus, with each muscle highlighting in turn -->
  <g transform="translate(60 90)">
    <!-- Scapula triangle (posterior view) -->
    <path d="M 60 30 L 280 60 L 240 280 Z" fill="#f0eadc" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Spine of scapula -->
    <line x1="80" y1="80" x2="270" y2="115" stroke="#1a1a1a" stroke-width="2"/>
    <text x="80" y="74" class="lbl-tiny">Spine of scapula</text>

    <!-- Humeral head -->
    <circle cx="320" cy="130" r="32" fill="#f0eadc" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Greater tubercle marker -->
    <circle cx="346" cy="120" r="5" fill="#1a1a1a"/>
    <text x="358" y="118" class="lbl-tiny">Greater tubercle</text>
    <!-- Lesser tubercle (front, dashed because hidden behind) -->
    <circle cx="298" cy="118" r="5" fill="none" stroke="#1a1a1a" stroke-dasharray="2 2"/>
    <text x="240" y="108" class="lbl-tiny" text-anchor="end">Lesser tubercle</text>

    <!-- Humeral shaft -->
    <path d="M 305 158 L 295 320 L 335 320 L 345 158" fill="#f0eadc" stroke="#1a1a1a" stroke-width="2"/>

    <!-- SUPRA — origin upper scapula above spine, insertion top of greater tub -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0;0;0;0;0;0" keyTimes="0;0.05;0.22;0.25;0.5;0.75;0.78;0.97;1" dur="12s" repeatCount="indefinite"/>
      <path d="M 80 50 C 150 55, 250 80, 340 118" fill="none" stroke="#c43c2c" stroke-width="14" stroke-linecap="round" opacity="0.78"/>
      <text x="160" y="40" class="lbl-bold" fill="#c43c2c">Supraspinatus</text>
    </g>
    <!-- INFRA — origin below spine, insertion middle facet greater tub -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;0;1;1;0;0;0;0" keyTimes="0;0.22;0.27;0.30;0.47;0.50;0.75;0.97;1" dur="12s" repeatCount="indefinite"/>
      <path d="M 100 130 C 180 140, 260 130, 342 124" fill="none" stroke="#3a6ea5" stroke-width="14" stroke-linecap="round" opacity="0.78"/>
      <text x="160" y="200" class="lbl-bold" fill="#3a6ea5">Infraspinatus</text>
    </g>
    <!-- TERES MINOR — origin lateral border, insertion below greater tub -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;0;0;0;1;1;0;0" keyTimes="0;0.22;0.47;0.50;0.55;0.55;0.72;0.75;1" dur="12s" repeatCount="indefinite"/>
      <path d="M 220 230 C 270 200, 310 170, 344 130" fill="none" stroke="#4a8a5c" stroke-width="11" stroke-linecap="round" opacity="0.85"/>
      <text x="260" y="270" class="lbl-bold" fill="#4a8a5c">Teres minor</text>
    </g>
    <!-- SUBSCAP — anterior surface of scapula, insertion lesser tub (dashed: hidden front) -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;0;0;0;0;0;1;1" keyTimes="0;0.22;0.47;0.55;0.72;0.75;0.78;0.80;0.97" dur="12s" repeatCount="indefinite"/>
      <path d="M 110 100 C 180 130, 230 130, 296 118" fill="none" stroke="#d49b3c" stroke-width="14" stroke-linecap="round" stroke-dasharray="6 4" opacity="0.78"/>
      <text x="160" y="100" class="lbl-bold" fill="#d49b3c">Subscapularis</text>
      <text x="160" y="116" class="lbl-tiny">(anterior surface, dashed = behind)</text>
    </g>

    <text x="0" y="345" class="lbl-tiny">Posterior view of right scapula + humerus</text>
  </g>

  <!-- RIGHT panel: action arrows around humerus -->
  <g transform="translate(560 90)">
    <text x="0" y="0" class="lbl-bold" fill="#1a1a1a">Action being performed</text>
    <!-- humerus arm — animated rotating/abducting -->
    <g transform="translate(180 200)">
      <!-- Body trunk reference -->
      <rect x="-100" y="-10" width="40" height="180" rx="6" fill="#f0eadc" stroke="#1a1a1a" stroke-width="1.5"/>
      <text x="-80" y="190" text-anchor="middle" class="lbl-tiny">trunk</text>

      <!-- Shoulder pivot -->
      <circle r="6" fill="#1a1a1a"/>

      <!-- Arm bone, rotates in unique animation per phase -->
      <g>
        <!-- Phase 1: SUPRA — abduction 0–15° -->
        <g opacity="0">
          <animate attributeName="opacity" values="1;1;0;0;0;0;0;0" keyTimes="0;0.22;0.25;0.47;0.72;0.97;0.99;1" dur="12s" repeatCount="indefinite"/>
          <line x1="0" y1="0" x2="0" y2="140" stroke="#c43c2c" stroke-width="14" stroke-linecap="round">
            <animateTransform attributeName="transform" type="rotate" values="0;0;-22;-22;0;0" keyTimes="0;0.05;0.18;0.21;0.24;1" dur="12s" repeatCount="indefinite"/>
          </line>
          <text x="20" y="20" class="lbl">Initiates ABduction (0–15°)</text>
        </g>
        <!-- Phase 2: INFRA — lateral rotation -->
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;0;0;0;0" keyTimes="0;0.25;0.27;0.47;0.49;0.72;0.97;1" dur="12s" repeatCount="indefinite"/>
          <!-- elbow bent 90° showing rotation -->
          <g>
            <line x1="0" y1="0" x2="0" y2="100" stroke="#3a6ea5" stroke-width="14" stroke-linecap="round"/>
            <line x1="0" y1="100" x2="60" y2="100" stroke="#3a6ea5" stroke-width="11" stroke-linecap="round">
              <animateTransform attributeName="transform" type="rotate" from="0 0 100" to="-50 0 100" dur="2.5s" begin="3.4s" fill="freeze"/>
              <animateTransform attributeName="transform" type="rotate" from="-50 0 100" to="0 0 100" dur="0.5s" begin="5.7s" fill="freeze"/>
            </line>
          </g>
          <text x="20" y="20" class="lbl">External (lateral) rotation</text>
        </g>
        <!-- Phase 3: TERES MINOR — also lateral rotation in abduction -->
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;0;0;1;1;0;0" keyTimes="0;0.25;0.49;0.51;0.55;0.72;0.75;1" dur="12s" repeatCount="indefinite"/>
          <g transform="rotate(-90)">
            <line x1="0" y1="0" x2="0" y2="100" stroke="#4a8a5c" stroke-width="14" stroke-linecap="round"/>
            <line x1="0" y1="100" x2="0" y2="180" stroke="#4a8a5c" stroke-width="11" stroke-linecap="round">
              <animateTransform attributeName="transform" type="rotate" values="0;-50;-50;0" keyTimes="0;0.5;0.85;1" dur="3s" begin="6.6s" repeatCount="1" fill="freeze"/>
            </line>
          </g>
          <text x="20" y="20" class="lbl">Lateral rotation in 90° ABd</text>
        </g>
        <!-- Phase 4: SUBSCAP — medial rotation -->
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;0;0;0;0;1;1" keyTimes="0;0.25;0.49;0.55;0.72;0.74;0.76;0.97" dur="12s" repeatCount="indefinite"/>
          <g>
            <line x1="0" y1="0" x2="0" y2="100" stroke="#d49b3c" stroke-width="14" stroke-linecap="round"/>
            <line x1="0" y1="100" x2="60" y2="100" stroke="#d49b3c" stroke-width="11" stroke-linecap="round">
              <animateTransform attributeName="transform" type="rotate" values="0;0;120;120;0" keyTimes="0;0.05;0.5;0.85;1" dur="3s" begin="9s" repeatCount="1" fill="freeze"/>
            </line>
          </g>
          <text x="20" y="20" class="lbl">Internal (medial) rotation</text>
        </g>
      </g>

      <!-- ROM arc reference -->
      <path d="M 0 100 A 100 100 0 0 0 -100 0" fill="none" stroke="#d8d8d2" stroke-width="1" stroke-dasharray="3 3"/>
      <path d="M 100 0 A 100 100 0 0 0 0 -100" fill="none" stroke="#d8d8d2" stroke-width="1" stroke-dasharray="3 3"/>
    </g>
  </g>

  <!-- BOTTOM table summary -->
  <g transform="translate(60 460)">
    <line x1="0" y1="0" x2="880" y2="0" stroke="#d8d8d2"/>
    <g class="lbl-tiny" fill="#888"><text x="0" y="18">MUSCLE</text><text x="200" y="18">ACTION</text><text x="430" y="18">NERVE</text><text x="640" y="18">CLINICAL TEST</text></g>

    <g class="lbl"><circle cx="-10" cy="40" r="4" fill="#c43c2c"/><text x="0" y="44" class="lbl-bold">Supraspinatus</text><text x="200" y="44">ABd 0–15°</text><text x="430" y="44">Suprascapular (C5–C6)</text><text x="640" y="44">Empty Can / Drop Arm</text></g>
    <g class="lbl"><circle cx="-10" cy="62" r="4" fill="#3a6ea5"/><text x="0" y="66" class="lbl-bold">Infraspinatus</text><text x="200" y="66">Lateral rotation</text><text x="430" y="66">Suprascapular (C5–C6)</text><text x="640" y="66">External Rotation Lag</text></g>
    <g class="lbl"><circle cx="-10" cy="84" r="4" fill="#4a8a5c"/><text x="0" y="88" class="lbl-bold">Teres minor</text><text x="200" y="88">Lateral rotation in ABd</text><text x="430" y="88">Axillary (C5–C6)</text><text x="640" y="88">Hornblower's sign</text></g>
    <g class="lbl"><circle cx="-10" cy="106" r="4" fill="#d49b3c"/><text x="0" y="110" class="lbl-bold">Subscapularis</text><text x="200" y="110">Medial rotation</text><text x="430" y="110">Upper/Lower subscapular</text><text x="640" y="110">Lift-off · Belly Press</text></g>
  </g>

  <text x="500" y="585" text-anchor="middle" class="caption">All four origin scapula → insert humerus tubercles · stabilise the GH joint</text>
</svg></div></body></html>
