<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Spinal Cord · animated</title>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Newsreader:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#fafaf7;font-family:"Inter Tight",system-ui,sans-serif;overflow:hidden}
  .frame{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;box-sizing:border-box}
  svg{width:100%;height:100%}
  .lbl-bold{font-family:"Inter Tight",sans-serif;font-size:12px;font-weight:600;fill:#1a1a1a}
  .lbl{font-family:"Inter Tight",sans-serif;font-size:11px;fill:#333}
  .lbl-tiny{font-family:"JetBrains Mono",monospace;font-size:9.5px;fill:#888;letter-spacing:.08em}
  .lbl-title{font-family:"Newsreader",Georgia,serif;font-style:italic;font-size:18px;fill:#1a1a1a;font-weight:500}
  .caption{font-family:"Newsreader",Georgia,serif;font-style:italic;font-size:13px;fill:#555}
</style></head><body><div class="frame">
<svg viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet">
  <text x="500" y="36" class="lbl-title" text-anchor="middle">Spinal Cord — cross section · sensory in, motor out</text>
  <text x="500" y="56" class="caption" text-anchor="middle">Dorsal root carries afferents · ventral root carries efferents</text>

  <!-- Cord cross-section: butterfly grey matter inside oval white matter -->
  <g transform="translate(500 320)">
    <!-- White matter -->
    <ellipse cx="0" cy="0" rx="170" ry="140" fill="#f0eadc" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Central canal -->
    <circle cx="0" cy="0" r="5" fill="#fff" stroke="#1a1a1a"/>
    <!-- Grey matter butterfly -->
    <path d="M -90 -75 C -110 -50 -90 -20 -50 -10 L -8 -10 L -8 10 L -50 10 C -90 20 -110 50 -90 75 L -50 80 C -20 60 -10 30 -10 10 L 10 10 C 10 30 20 60 50 80 L 90 75 C 110 50 90 20 50 10 L 8 10 L 8 -10 L 50 -10 C 90 -20 110 -50 90 -75 L 50 -80 C 20 -60 10 -30 10 -10 L -10 -10 C -10 -30 -20 -60 -50 -80 Z"
          fill="#bfb6a3" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Dorsal/ventral labels INSIDE -->
    <text x="0" y="-100" text-anchor="middle" class="lbl-tiny" fill="#444">DORSAL HORN</text>
    <text x="0" y="115" text-anchor="middle" class="lbl-tiny" fill="#444">VENTRAL HORN</text>
    <!-- Dorsal/ventral arrows -->
    <text x="0" y="-160" text-anchor="middle" class="lbl-bold">DORSAL (posterior)</text>
    <text x="0" y="180" text-anchor="middle" class="lbl-bold">VENTRAL (anterior)</text>
  </g>

  <!-- Dorsal root + ganglion (top) — sensory IN -->
  <g>
    <!-- ganglion bulge -->
    <ellipse cx="700" cy="220" rx="14" ry="10" fill="#3a6ea5" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="730" y="218" class="lbl-bold" fill="#3a6ea5">Dorsal root ganglion</text>
    <text x="730" y="232" class="lbl-tiny">Cell bodies of sensory neurons</text>

    <!-- Path from periphery → ganglion → cord (animated direction in) -->
    <path id="afferent" d="M 880 250 C 800 250, 760 230, 714 222 C 690 218, 670 230, 650 240 C 600 260, 580 250, 520 268"
          fill="none" stroke="#3a6ea5" stroke-width="2.4" stroke-linecap="round" stroke-dasharray="6 4">
      <animate attributeName="stroke-dashoffset" values="200;0" dur="3s" repeatCount="indefinite"/>
    </path>
    <text x="780" y="200" class="lbl" fill="#3a6ea5">Sensory IN (afferent) →</text>
  </g>

  <!-- Ventral root (bottom) — motor OUT -->
  <g>
    <path id="efferent" d="M 520 372 C 580 380, 600 380, 650 390 C 690 398, 750 400, 880 410"
          fill="none" stroke="#c43c2c" stroke-width="2.4" stroke-linecap="round" stroke-dasharray="6 4">
      <animate attributeName="stroke-dashoffset" values="0;-200" dur="3s" repeatCount="indefinite"/>
    </path>
    <text x="780" y="430" class="lbl" fill="#c43c2c">← Motor OUT (efferent)</text>
  </g>

  <!-- Spinal nerve & rami split -->
  <g>
    <!-- where roots merge -->
    <circle cx="850" cy="330" r="6" fill="#fff" stroke="#1a1a1a" stroke-width="2"/>
    <text x="858" y="334" class="lbl-bold">Spinal nerve</text>
    <!-- merging lines -->
    <line x1="822" y1="260" x2="848" y2="324" stroke="#1a1a1a" stroke-width="1.6"/>
    <line x1="822" y1="400" x2="848" y2="336" stroke="#1a1a1a" stroke-width="1.6"/>

    <!-- Posterior ramus -->
    <path d="M 856 330 C 900 310, 930 280, 950 260" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="120" stroke-dashoffset="120">
      <animate attributeName="stroke-dashoffset" values="120;120;0;0" keyTimes="0;0.5;0.7;1" dur="6s" repeatCount="indefinite"/>
    </path>
    <text x="930" y="248" text-anchor="end" class="lbl">Posterior ramus → back muscles</text>

    <!-- Anterior ramus (the one that joins plexus) -->
    <path d="M 856 332 C 900 350, 930 380, 960 410" stroke="#c43c2c" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-dasharray="140" stroke-dashoffset="140">
      <animate attributeName="stroke-dashoffset" values="140;140;0;0" keyTimes="0;0.5;0.75;1" dur="6s" repeatCount="indefinite"/>
    </path>
    <text x="950" y="430" text-anchor="end" class="lbl-bold" fill="#c43c2c">Anterior ramus → Brachial plexus</text>
  </g>

  <!-- Skin/muscle target on right edge -->
  <g>
    <!-- skin -->
    <rect x="876" y="240" width="10" height="40" rx="3" fill="#f4d4c4" stroke="#1a1a1a"/>
    <text x="892" y="256" class="lbl-tiny">SKIN</text>
    <text x="892" y="270" class="lbl-tiny">(dermatome)</text>
    <!-- muscle -->
    <rect x="876" y="400" width="10" height="40" rx="3" fill="#c97070" stroke="#1a1a1a"/>
    <text x="892" y="416" class="lbl-tiny">MUSCLE</text>
    <text x="892" y="430" class="lbl-tiny">(myotome)</text>
  </g>

  <!-- Pulse dot moving in -->
  <circle r="6" fill="#3a6ea5">
    <animateMotion dur="3s" repeatCount="indefinite" rotate="auto">
      <mpath href="#afferent"/>
    </animateMotion>
  </circle>
  <!-- Pulse dot moving out -->
  <circle r="6" fill="#c43c2c">
    <animateMotion dur="3s" repeatCount="indefinite" rotate="auto" keyPoints="1;0" keyTimes="0;1">
      <mpath href="#efferent"/>
    </animateMotion>
  </circle>

  <!-- Legend -->
  <g transform="translate(60 555)">
    <rect width="14" height="3" fill="#3a6ea5"/><text x="20" y="4" class="lbl-tiny">Afferent · sensory in (dorsal root)</text>
    <rect x="280" width="14" height="3" fill="#c43c2c"/><text x="300" y="4" class="lbl-tiny">Efferent · motor out (ventral root)</text>
    <text x="600" y="4" class="lbl-tiny">Each spinal nerve = dorsal + ventral roots combined</text>
  </g>
</svg></div></body></html>
