<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Nerve Injury Syndromes · animated</title>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Newsreader:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
<style>html,body{margin:0;padding:0;background:#fafaf7;font-family:"Inter Tight",system-ui,sans-serif;overflow:hidden}.frame{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;box-sizing:border-box}svg{width:100%;height:100%}.lbl{font-family:"Inter Tight",sans-serif;font-size:11.5px;fill:#222}.lbl-bold{font-family:"Inter Tight",sans-serif;font-size:12px;font-weight:700;fill:#1a1a1a}.lbl-tiny{font-family:"JetBrains Mono",monospace;font-size:9.5px;fill:#888;letter-spacing:.06em}.lbl-title{font-family:"Newsreader",Georgia,serif;font-style:italic;font-size:18px;fill:#1a1a1a;font-weight:500}.caption{font-family:"Newsreader",Georgia,serif;font-style:italic;font-size:13px;fill:#555}.t{font-family:"Newsreader",serif;font-style:italic;font-size:14px;fill:#c43c2c;font-weight:500}</style>
</head><body><div class="frame">
<svg viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet">
  <text x="500" y="32" class="lbl-title" text-anchor="middle">Nerve Injury Syndromes — four classic postures</text>
  <text x="500" y="50" class="caption" text-anchor="middle">Each panel cycles between normal posture and the injury posture every few seconds</text>

  <!-- Quadrant 1: ERB'S — waiter's tip -->
  <g transform="translate(100 90)">
    <text x="100" y="0" text-anchor="middle" class="t">Erb's palsy · C5–C6</text>
    <text x="100" y="18" text-anchor="middle" class="lbl-tiny">Upper trunk · "waiter's tip"</text>
    <!-- shoulder -->
    <circle cx="100" cy="50" r="22" fill="#f0eadc" stroke="#1a1a1a" stroke-width="2"/>
    <!-- arm (rotates: extended down + medially rotated) -->
    <g transform="translate(100 70)">
      <g>
        <!-- waiter's tip: arm adducted, internally rotated, forearm pronated, hand back-of-palm forward -->
        <animateTransform attributeName="transform" type="rotate" values="0;0;15;15;0" keyTimes="0;0.3;0.5;0.85;1" dur="6s" repeatCount="indefinite"/>
        <rect x="-10" y="0" width="20" height="80" rx="5" fill="#f0eadc" stroke="#1a1a1a" stroke-width="1.5"/>
        <!-- forearm -->
        <g transform="translate(0 80)">
          <g>
            <!-- normal: flexed; injury: extended -->
            <animateTransform attributeName="transform" type="rotate" values="-90;-90;-15;-15;-90" keyTimes="0;0.3;0.5;0.85;1" dur="6s" repeatCount="indefinite"/>
            <rect x="-8" y="0" width="16" height="60" rx="4" fill="#f0eadc" stroke="#1a1a1a" stroke-width="1.5"/>
            <!-- hand pronated -->
            <ellipse cx="0" cy="68" rx="14" ry="8" fill="#f0eadc" stroke="#1a1a1a" stroke-width="1.5"/>
          </g>
        </g>
      </g>
    </g>
    <text x="100" y="220" text-anchor="middle" class="lbl-tiny">adducted · int. rotated · pronated</text>
  </g>

  <!-- Quadrant 2: KLUMPKE — claw -->
  <g transform="translate(360 90)">
    <text x="100" y="0" text-anchor="middle" class="t">Klumpke's · C8–T1</text>
    <text x="100" y="18" text-anchor="middle" class="lbl-tiny">Lower trunk · claw hand</text>
    <!-- mini hand showing claw alternating -->
    <g transform="translate(60 60)">
      <rect x="0" y="50" width="80" height="60" rx="10" fill="#f0eadc" stroke="#1a1a1a" stroke-width="1.5"/>
      <!-- index/middle straight -->
      <line x1="14" y1="50" x2="14" y2="0" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"/>
      <line x1="32" y1="50" x2="32" y2="-2" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"/>
      <!-- ring + little: alternate normal/claw -->
      <g transform="translate(50 50)">
        <line x1="0" y1="0" x2="0" y2="-22" stroke="#c43c2c" stroke-width="8" stroke-linecap="round">
          <animateTransform attributeName="transform" type="rotate" values="0;0;-30;-30;0" keyTimes="0;0.3;0.5;0.85;1" dur="6s" repeatCount="indefinite"/>
        </line>
        <line x1="0" y1="-22" x2="0" y2="-44" stroke="#c43c2c" stroke-width="8" stroke-linecap="round" transform="translate(0 -22)">
          <animateTransform attributeName="transform" type="rotate" values="0;0;65;65;0" keyTimes="0;0.3;0.5;0.85;1" dur="6s" repeatCount="indefinite" additive="sum"/>
        </line>
      </g>
      <g transform="translate(68 50)">
        <line x1="0" y1="0" x2="0" y2="-20" stroke="#c43c2c" stroke-width="8" stroke-linecap="round">
          <animateTransform attributeName="transform" type="rotate" values="0;0;-35;-35;0" keyTimes="0;0.3;0.5;0.85;1" dur="6s" repeatCount="indefinite"/>
        </line>
        <line x1="0" y1="-20" x2="0" y2="-40" stroke="#c43c2c" stroke-width="8" stroke-linecap="round" transform="translate(0 -20)">
          <animateTransform attributeName="transform" type="rotate" values="0;0;70;70;0" keyTimes="0;0.3;0.5;0.85;1" dur="6s" repeatCount="indefinite" additive="sum"/>
        </line>
      </g>
    </g>
    <text x="100" y="220" text-anchor="middle" class="lbl-tiny">MCP hyperext · IP flexed · "intrinsic minus"</text>
  </g>

  <!-- Quadrant 3: WRIST DROP -->
  <g transform="translate(620 90)">
    <text x="100" y="0" text-anchor="middle" class="t">Wrist drop · radial</text>
    <text x="100" y="18" text-anchor="middle" class="lbl-tiny">Spiral groove · Sat. night palsy</text>
    <!-- Forearm horizontal, hand drops -->
    <g transform="translate(40 80)">
      <rect x="0" y="20" width="100" height="20" rx="6" fill="#f0eadc" stroke="#1a1a1a" stroke-width="1.5"/>
      <text x="50" y="14" class="lbl-tiny" text-anchor="middle">forearm</text>
      <!-- hand at the end, rotates -->
      <g transform="translate(100 30)">
        <g>
          <animateTransform attributeName="transform" type="rotate" values="0;0;-65;-65;0" keyTimes="0;0.3;0.5;0.85;1" dur="6s" repeatCount="indefinite"/>
          <path d="M 0 -10 C 0 -10, 50 -10, 55 0 C 60 10, 50 20, 0 20 Z" fill="#f0eadc" stroke="#1a1a1a" stroke-width="1.5"/>
          <line x1="20" y1="-7" x2="50" y2="-7" stroke="#1a1a1a" stroke-width="1"/>
          <line x1="20" y1="0" x2="55" y2="0" stroke="#1a1a1a" stroke-width="1"/>
          <line x1="20" y1="7" x2="55" y2="7" stroke="#1a1a1a" stroke-width="1"/>
        </g>
      </g>
    </g>
    <text x="100" y="220" text-anchor="middle" class="lbl-tiny">cannot extend wrist or fingers (MCP)</text>
  </g>

  <!-- Quadrant 4: APE HAND (median) -->
  <g transform="translate(100 350)">
    <text x="100" y="0" text-anchor="middle" class="t">Ape hand · median</text>
    <text x="100" y="18" text-anchor="middle" class="lbl-tiny">Lost thumb opposition · CTS / high median</text>
    <g transform="translate(60 50)">
      <rect x="0" y="50" width="80" height="80" rx="12" fill="#f0eadc" stroke="#1a1a1a" stroke-width="1.5"/>
      <!-- thenar atrophies -->
      <ellipse cx="14" cy="100" rx="14" ry="22" fill="#c97070" opacity="0.55">
        <animate attributeName="opacity" values="0.55;0.55;0.1;0.1;0.55" keyTimes="0;0.3;0.5;0.85;1" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="rx" values="14;14;6;6;14" keyTimes="0;0.3;0.5;0.85;1" dur="6s" repeatCount="indefinite"/>
      </ellipse>
      <!-- thumb: oppositional vs flat -->
      <g transform="translate(0 90)">
        <g>
          <animateTransform attributeName="transform" type="rotate" values="-30;-30;0;0;-30" keyTimes="0;0.3;0.5;0.85;1" dur="6s" repeatCount="indefinite"/>
          <line x1="0" y1="0" x2="-30" y2="0" stroke="#c43c2c" stroke-width="9" stroke-linecap="round"/>
        </g>
      </g>
      <!-- fingers straight -->
      <line x1="20" y1="50" x2="20" y2="-2" stroke="#1a1a1a" stroke-width="9" stroke-linecap="round"/>
      <line x1="40" y1="50" x2="40" y2="-6" stroke="#1a1a1a" stroke-width="9" stroke-linecap="round"/>
      <line x1="60" y1="50" x2="60" y2="-2" stroke="#1a1a1a" stroke-width="9" stroke-linecap="round"/>
      <line x1="78" y1="50" x2="78" y2="6" stroke="#1a1a1a" stroke-width="9" stroke-linecap="round"/>
    </g>
    <text x="100" y="240" text-anchor="middle" class="lbl-tiny">thenar wasting · thumb flat in plane of palm</text>
  </g>

  <!-- Center diagram + level mapping -->
  <g transform="translate(420 350)">
    <text x="160" y="0" text-anchor="middle" class="lbl-bold">Where each lesion sits</text>
    <!-- mini plexus diagram -->
    <g transform="translate(20 20)">
      <line x1="0" y1="20" x2="60" y2="20" stroke="#1a1a1a" stroke-width="2"/>
      <line x1="0" y1="40" x2="60" y2="40" stroke="#1a1a1a" stroke-width="2"/>
      <line x1="0" y1="80" x2="60" y2="80" stroke="#1a1a1a" stroke-width="2"/>
      <line x1="0" y1="120" x2="60" y2="120" stroke="#1a1a1a" stroke-width="2"/>
      <line x1="0" y1="140" x2="60" y2="140" stroke="#1a1a1a" stroke-width="2"/>
      <text x="-6" y="24" class="lbl-tiny" text-anchor="end">C5</text>
      <text x="-6" y="44" class="lbl-tiny" text-anchor="end">C6</text>
      <text x="-6" y="84" class="lbl-tiny" text-anchor="end">C7</text>
      <text x="-6" y="124" class="lbl-tiny" text-anchor="end">C8</text>
      <text x="-6" y="144" class="lbl-tiny" text-anchor="end">T1</text>

      <!-- Erb's bracket -->
      <rect x="-2" y="14" width="66" height="36" fill="none" stroke="#c43c2c" stroke-width="1.5" rx="3"/>
      <text x="74" y="36" class="lbl" fill="#c43c2c">Erb's (waiter's tip)</text>
      <!-- Klumpke bracket -->
      <rect x="-2" y="114" width="66" height="36" fill="none" stroke="#c43c2c" stroke-width="1.5" rx="3"/>
      <text x="74" y="136" class="lbl" fill="#c43c2c">Klumpke's (claw)</text>
      <!-- radial: posterior cord -->
      <text x="74" y="78" class="lbl" fill="#3a6ea5">Radial → wrist drop</text>
      <!-- median: lateral+medial -->
      <text x="74" y="100" class="lbl" fill="#d49b3c">Median → ape hand</text>
    </g>
  </g>

  <text x="500" y="585" text-anchor="middle" class="caption">Each posture animates between healthy ↔ injured to make the deformity unmistakable</text>
</svg></div></body></html>
