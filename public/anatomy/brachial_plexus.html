<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Brachial Plexus · animated</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Newsreader:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#fafaf7;font-family:"Inter Tight",system-ui,sans-serif;overflow:hidden}
  .frame{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;box-sizing:border-box}
  svg{width:100%;height:100%}
  .lbl-bold{font-family:"Inter Tight",sans-serif;font-size:12px;font-weight:600;fill:#1a1a1a}
  .lbl-tiny{font-family:"JetBrains Mono",monospace;font-size:9px;fill:#888;letter-spacing:.08em}
  .lbl-title{font-family:"Newsreader",Georgia,serif;font-style:italic;font-size:18px;fill:#1a1a1a;font-weight:500}
  .caption{font-family:"Newsreader",Georgia,serif;font-style:italic;font-size:13px;fill:#555}
</style></head><body>
<div class="frame">
<svg viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet">
  <text x="500" y="34" class="lbl-title" text-anchor="middle">Brachial Plexus — C5 to T1, traced in five phases</text>
  <text x="500" y="54" class="caption" text-anchor="middle">Roots → Trunks → Divisions → Cords → Branches</text>
  <g text-anchor="middle" class="lbl-tiny">
    <text x="100" y="92">ROOTS</text><text x="320" y="92">TRUNKS</text>
    <text x="470" y="92">DIVISIONS</text><text x="665" y="92">CORDS</text><text x="870" y="92">BRANCHES</text>
  </g>
  <line x1="80" y1="120" x2="80" y2="500" stroke="#d8d8d2" stroke-width="2" stroke-dasharray="3 3"/>

  <!-- Roots boxes -->
  <g font-family="JetBrains Mono" font-size="10" font-weight="700" text-anchor="middle">
    <rect x="68" y="128" width="24" height="22" rx="3" fill="#fff" stroke="#1a1a1a"/><text x="80" y="143">C5</text>
    <rect x="68" y="170" width="24" height="22" rx="3" fill="#fff" stroke="#1a1a1a"/><text x="80" y="185">C6</text>
    <rect x="68" y="244" width="24" height="22" rx="3" fill="#fff" stroke="#1a1a1a"/><text x="80" y="259">C7</text>
    <rect x="68" y="318" width="24" height="22" rx="3" fill="#fff" stroke="#1a1a1a"/><text x="80" y="333">C8</text>
    <rect x="68" y="378" width="24" height="22" rx="3" fill="#fff" stroke="#1a1a1a"/><text x="80" y="393">T1</text>
  </g>

  <!-- Roots → 5 short emerging lines -->
  <g stroke="#1a1a1a" stroke-width="2.4" fill="none" stroke-linecap="round">
    <line x1="92" y1="139" x2="160" y2="160" stroke-dasharray="75" stroke-dashoffset="75">
      <animate attributeName="stroke-dashoffset" values="75;75;0;0" keyTimes="0;0;0.18;1" dur="11s" repeatCount="indefinite"/>
    </line>
    <line x1="92" y1="181" x2="160" y2="180" stroke-dasharray="70" stroke-dashoffset="70">
      <animate attributeName="stroke-dashoffset" values="70;70;0;0" keyTimes="0;0.02;0.2;1" dur="11s" repeatCount="indefinite"/>
    </line>
    <line x1="92" y1="255" x2="160" y2="280" stroke-dasharray="75" stroke-dashoffset="75">
      <animate attributeName="stroke-dashoffset" values="75;75;0;0" keyTimes="0;0.04;0.22;1" dur="11s" repeatCount="indefinite"/>
    </line>
    <line x1="92" y1="329" x2="160" y2="380" stroke-dasharray="80" stroke-dashoffset="80">
      <animate attributeName="stroke-dashoffset" values="80;80;0;0" keyTimes="0;0.06;0.24;1" dur="11s" repeatCount="indefinite"/>
    </line>
    <line x1="92" y1="389" x2="160" y2="400" stroke-dasharray="75" stroke-dashoffset="75">
      <animate attributeName="stroke-dashoffset" values="75;75;0;0" keyTimes="0;0.08;0.26;1" dur="11s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Roots → Trunks -->
  <g stroke="#1a1a1a" stroke-width="2.4" fill="none" stroke-linecap="round">
    <path d="M 160 160 C 230 160, 250 175, 320 175" stroke-dasharray="170" stroke-dashoffset="170">
      <animate attributeName="stroke-dashoffset" values="170;170;0;0" keyTimes="0;0.15;0.32;1" dur="11s" repeatCount="indefinite"/>
    </path>
    <path d="M 160 180 C 230 180, 250 175, 320 175" stroke-dasharray="170" stroke-dashoffset="170">
      <animate attributeName="stroke-dashoffset" values="170;170;0;0" keyTimes="0;0.16;0.33;1" dur="11s" repeatCount="indefinite"/>
    </path>
    <path d="M 160 280 L 320 280" stroke-dasharray="160" stroke-dashoffset="160">
      <animate attributeName="stroke-dashoffset" values="160;160;0;0" keyTimes="0;0.17;0.34;1" dur="11s" repeatCount="indefinite"/>
    </path>
    <path d="M 160 380 C 230 380, 250 385, 320 385" stroke-dasharray="170" stroke-dashoffset="170">
      <animate attributeName="stroke-dashoffset" values="170;170;0;0" keyTimes="0;0.18;0.35;1" dur="11s" repeatCount="indefinite"/>
    </path>
    <path d="M 160 400 C 230 400, 250 385, 320 385" stroke-dasharray="170" stroke-dashoffset="170">
      <animate attributeName="stroke-dashoffset" values="170;170;0;0" keyTimes="0;0.19;0.36;1" dur="11s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Trunk nodes -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.30;0.36;1" dur="11s" repeatCount="indefinite"/>
    <circle cx="320" cy="175" r="11" fill="#fff" stroke="#1a1a1a" stroke-width="2"/><text x="320" y="179" text-anchor="middle" font-family="Inter Tight" font-size="10" font-weight="700">U</text><text x="320" y="158" text-anchor="middle" class="lbl-tiny">UPPER</text>
    <circle cx="320" cy="280" r="11" fill="#fff" stroke="#1a1a1a" stroke-width="2"/><text x="320" y="284" text-anchor="middle" font-family="Inter Tight" font-size="10" font-weight="700">M</text><text x="320" y="263" text-anchor="middle" class="lbl-tiny">MIDDLE</text>
    <circle cx="320" cy="385" r="11" fill="#fff" stroke="#1a1a1a" stroke-width="2"/><text x="320" y="389" text-anchor="middle" font-family="Inter Tight" font-size="10" font-weight="700">L</text><text x="320" y="368" text-anchor="middle" class="lbl-tiny">LOWER</text>
  </g>

  <!-- Trunks → Divisions -->
  <g fill="none" stroke-linecap="round" stroke-width="2.2">
    <path d="M 331 175 C 380 175, 400 150, 460 150" stroke="#c43c2c" stroke-dasharray="140" stroke-dashoffset="140">
      <animate attributeName="stroke-dashoffset" values="140;140;0;0" keyTimes="0;0.36;0.48;1" dur="11s" repeatCount="indefinite"/>
    </path>
    <path d="M 331 175 C 380 175, 400 200, 460 200" stroke="#3a6ea5" stroke-dasharray="140" stroke-dashoffset="140">
      <animate attributeName="stroke-dashoffset" values="140;140;0;0" keyTimes="0;0.37;0.49;1" dur="11s" repeatCount="indefinite"/>
    </path>
    <path d="M 331 280 C 380 280, 400 255, 460 255" stroke="#c43c2c" stroke-dasharray="140" stroke-dashoffset="140">
      <animate attributeName="stroke-dashoffset" values="140;140;0;0" keyTimes="0;0.38;0.50;1" dur="11s" repeatCount="indefinite"/>
    </path>
    <path d="M 331 280 C 380 280, 400 305, 460 305" stroke="#3a6ea5" stroke-dasharray="140" stroke-dashoffset="140">
      <animate attributeName="stroke-dashoffset" values="140;140;0;0" keyTimes="0;0.39;0.51;1" dur="11s" repeatCount="indefinite"/>
    </path>
    <path d="M 331 385 C 380 385, 400 360, 460 360" stroke="#c43c2c" stroke-dasharray="140" stroke-dashoffset="140">
      <animate attributeName="stroke-dashoffset" values="140;140;0;0" keyTimes="0;0.40;0.52;1" dur="11s" repeatCount="indefinite"/>
    </path>
    <path d="M 331 385 C 380 385, 400 410, 460 410" stroke="#3a6ea5" stroke-dasharray="140" stroke-dashoffset="140">
      <animate attributeName="stroke-dashoffset" values="140;140;0;0" keyTimes="0;0.41;0.53;1" dur="11s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Divisions → Cords -->
  <g fill="none" stroke-linecap="round" stroke-width="2.2">
    <path d="M 460 150 C 540 150, 560 165, 620 175" stroke="#c43c2c" stroke-dasharray="170" stroke-dashoffset="170">
      <animate attributeName="stroke-dashoffset" values="170;170;0;0" keyTimes="0;0.53;0.65;1" dur="11s" repeatCount="indefinite"/>
    </path>
    <path d="M 460 255 C 540 255, 560 200, 620 175" stroke="#c43c2c" stroke-dasharray="180" stroke-dashoffset="180">
      <animate attributeName="stroke-dashoffset" values="180;180;0;0" keyTimes="0;0.54;0.66;1" dur="11s" repeatCount="indefinite"/>
    </path>
    <path d="M 460 360 C 540 360, 560 360, 620 360" stroke="#4a8a5c" stroke-dasharray="160" stroke-dashoffset="160">
      <animate attributeName="stroke-dashoffset" values="160;160;0;0" keyTimes="0;0.55;0.67;1" dur="11s" repeatCount="indefinite"/>
    </path>
    <path d="M 460 200 C 540 200, 560 240, 620 270" stroke="#3a6ea5" stroke-dasharray="175" stroke-dashoffset="175">
      <animate attributeName="stroke-dashoffset" values="175;175;0;0" keyTimes="0;0.56;0.68;1" dur="11s" repeatCount="indefinite"/>
    </path>
    <path d="M 460 305 C 540 305, 560 280, 620 270" stroke="#3a6ea5" stroke-dasharray="165" stroke-dashoffset="165">
      <animate attributeName="stroke-dashoffset" values="165;165;0;0" keyTimes="0;0.57;0.69;1" dur="11s" repeatCount="indefinite"/>
    </path>
    <path d="M 460 410 C 540 410, 560 320, 620 270" stroke="#3a6ea5" stroke-dasharray="200" stroke-dashoffset="200">
      <animate attributeName="stroke-dashoffset" values="200;200;0;0" keyTimes="0;0.58;0.70;1" dur="11s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Cord pills -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.65;0.72;1" dur="11s" repeatCount="indefinite"/>
    <rect x="620" y="164" width="100" height="22" rx="11" fill="#c43c2c"/><text x="670" y="178" text-anchor="middle" fill="#fff" font-family="JetBrains Mono" font-size="10" font-weight="700">LATERAL</text>
    <rect x="620" y="259" width="100" height="22" rx="11" fill="#3a6ea5"/><text x="670" y="273" text-anchor="middle" fill="#fff" font-family="JetBrains Mono" font-size="10" font-weight="700">POSTERIOR</text>
    <rect x="620" y="349" width="100" height="22" rx="11" fill="#4a8a5c"/><text x="670" y="363" text-anchor="middle" fill="#fff" font-family="JetBrains Mono" font-size="10" font-weight="700">MEDIAL</text>
  </g>

  <!-- Cords → Branches -->
  <g fill="none" stroke-linecap="round" stroke-width="2.6">
    <path d="M 720 175 C 770 175, 790 130, 830 130" stroke="#c43c2c" stroke-dasharray="140" stroke-dashoffset="140">
      <animate attributeName="stroke-dashoffset" values="140;140;0;0" keyTimes="0;0.72;0.82;1" dur="11s" repeatCount="indefinite"/>
    </path>
    <path d="M 720 175 C 770 175, 790 220, 830 220" stroke="#c43c2c" stroke-dasharray="140" stroke-dashoffset="140">
      <animate attributeName="stroke-dashoffset" values="140;140;0;0" keyTimes="0;0.73;0.83;1" dur="11s" repeatCount="indefinite"/>
    </path>
    <path d="M 720 360 C 770 360, 790 240, 830 220" stroke="#4a8a5c" stroke-dasharray="4 3" stroke-width="1.6">
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.74;0.85;1" dur="11s" repeatCount="indefinite"/>
    </path>
    <path d="M 720 270 C 770 270, 790 280, 830 280" stroke="#3a6ea5" stroke-dasharray="120" stroke-dashoffset="120">
      <animate attributeName="stroke-dashoffset" values="120;120;0;0" keyTimes="0;0.75;0.85;1" dur="11s" repeatCount="indefinite"/>
    </path>
    <path d="M 720 270 C 770 270, 790 340, 830 340" stroke="#3a6ea5" stroke-dasharray="140" stroke-dashoffset="140">
      <animate attributeName="stroke-dashoffset" values="140;140;0;0" keyTimes="0;0.76;0.86;1" dur="11s" repeatCount="indefinite"/>
    </path>
    <path d="M 720 360 C 770 360, 790 410, 830 410" stroke="#4a8a5c" stroke-dasharray="130" stroke-dashoffset="130">
      <animate attributeName="stroke-dashoffset" values="130;130;0;0" keyTimes="0;0.77;0.87;1" dur="11s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Branch labels -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.85;0.92;1" dur="11s" repeatCount="indefinite"/>
    <circle cx="830" cy="130" r="5" fill="#c43c2c"/><text x="844" y="128" class="lbl-bold">Musculocutaneous</text><text x="844" y="142" class="lbl-tiny">C5–C7 · biceps, brachialis</text>
    <circle cx="830" cy="220" r="5" fill="#c43c2c"/><text x="844" y="218" class="lbl-bold">Median</text><text x="844" y="232" class="lbl-tiny">C5–T1 · LOAF, CTS</text>
    <circle cx="830" cy="280" r="5" fill="#3a6ea5"/><text x="844" y="278" class="lbl-bold">Axillary</text><text x="844" y="292" class="lbl-tiny">C5–C6 · deltoid</text>
    <circle cx="830" cy="340" r="5" fill="#3a6ea5"/><text x="844" y="338" class="lbl-bold">Radial</text><text x="844" y="352" class="lbl-tiny">C5–T1 · all extensors</text>
    <circle cx="830" cy="410" r="5" fill="#4a8a5c"/><text x="844" y="408" class="lbl-bold">Ulnar</text><text x="844" y="422" class="lbl-tiny">C8–T1 · intrinsics</text>
  </g>

  <g transform="translate(60 540)">
    <rect x="0" y="0" width="14" height="3" fill="#c43c2c"/><text x="20" y="4" class="lbl-tiny">Anterior divisions / Lateral cord</text>
    <rect x="220" y="0" width="14" height="3" fill="#3a6ea5"/><text x="240" y="4" class="lbl-tiny">Posterior divisions / Posterior cord</text>
    <rect x="470" y="0" width="14" height="3" fill="#4a8a5c"/><text x="490" y="4" class="lbl-tiny">Anterior of lower / Medial cord</text>
  </g>
  <text x="500" y="575" text-anchor="middle" class="caption">Mnemonic: Robert Taylor Drinks Cold Beer · loop ≈ 11s</text>
</svg></div></body></html>
