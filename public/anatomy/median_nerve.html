<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Median Nerve · animated</title>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Newsreader:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
<style>html,body{margin:0;padding:0;background:#fafaf7;font-family:"Inter Tight",system-ui,sans-serif;overflow:hidden}.frame{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;box-sizing:border-box}svg{width:100%;height:100%}.lbl{font-family:"Inter Tight",sans-serif;font-size:11.5px;fill:#222}.lbl-bold{font-family:"Inter Tight",sans-serif;font-size:12px;font-weight:700;fill:#1a1a1a}.lbl-tiny{font-family:"JetBrains Mono",monospace;font-size:9.5px;fill:#888;letter-spacing:.06em}.lbl-title{font-family:"Newsreader",Georgia,serif;font-style:italic;font-size:18px;fill:#1a1a1a;font-weight:500}.caption{font-family:"Newsreader",Georgia,serif;font-style:italic;font-size:13px;fill:#555}</style>
</head><body><div class="frame">
<svg viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet">
  <text x="500" y="34" class="lbl-title" text-anchor="middle">Median Nerve — C6 to T1, lateral + medial cord</text>
  <text x="500" y="54" class="caption" text-anchor="middle">Watch the trace · then the carpal tunnel constricts · then thenar fades = ape hand</text>

  <!-- Arm silhouette -->
  <g transform="translate(160 80)">
    <!-- shoulder -->
    <circle cx="60" cy="40" r="32" fill="#f0eadc" stroke="#1a1a1a" stroke-width="2"/>
    <!-- upper arm -->
    <path d="M 38 65 L 28 220 L 92 220 L 82 65 Z" fill="#f0eadc" stroke="#1a1a1a" stroke-width="2"/>
    <!-- elbow / cubital fossa -->
    <ellipse cx="60" cy="225" rx="34" ry="10" fill="#f4d4c4" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="105" y="228" class="lbl-tiny">Cubital fossa</text>
    <!-- forearm -->
    <path d="M 30 235 L 35 410 L 90 410 L 90 235 Z" fill="#f0eadc" stroke="#1a1a1a" stroke-width="2"/>
    <!-- wrist + carpal tunnel -->
    <rect x="25" y="408" width="70" height="20" rx="4" fill="#bfb6a3" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="105" y="421" class="lbl-bold" fill="#c43c2c">Carpal tunnel</text>
    <!-- carpal tunnel constricts -->
    <rect x="35" y="412" width="50" height="12" rx="3" fill="#c43c2c" opacity="0">
      <animate attributeName="opacity" values="0;0;0.7;0.7;0" keyTimes="0;0.55;0.65;0.85;1" dur="9s" repeatCount="indefinite"/>
    </rect>
    <!-- hand -->
    <path d="M 30 428 C 20 460, 22 490, 30 500 L 90 500 C 98 490, 100 460, 90 428 Z" fill="#f0eadc" stroke="#1a1a1a" stroke-width="2"/>
    <!-- thumb -->
    <path d="M 25 440 C 5 450, 0 470, 12 480 L 30 470" fill="#f0eadc" stroke="#1a1a1a" stroke-width="2"/>
    <!-- thenar eminence -->
    <ellipse cx="42" cy="465" rx="14" ry="20" fill="#c97070" opacity="0.55">
      <animate attributeName="opacity" values="0.55;0.55;0.55;0.55;0.1;0.1;0.55" keyTimes="0;0.55;0.7;0.78;0.85;0.95;1" dur="9s" repeatCount="indefinite"/>
    </ellipse>
    <text x="60" y="465" class="lbl-tiny" fill="#444">thenar</text>

    <!-- The median nerve path itself -->
    <path id="median" d="M 60 50 L 50 100 L 50 220 L 50 280 L 55 410 L 50 440 L 45 470 L 50 495"
          fill="none" stroke="#c43c2c" stroke-width="3" stroke-linecap="round"
          stroke-dasharray="500" stroke-dashoffset="500">
      <animate attributeName="stroke-dashoffset" values="500;500;0;0" keyTimes="0;0.05;0.45;1" dur="9s" repeatCount="indefinite"/>
    </path>
    <!-- branch to LOAF -->
    <path d="M 50 470 C 35 470, 32 472, 30 480" stroke="#c43c2c" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-dasharray="30" stroke-dashoffset="30">
      <animate attributeName="stroke-dashoffset" values="30;30;0;0" keyTimes="0;0.42;0.50;1" dur="9s" repeatCount="indefinite"/>
    </path>
    <!-- pulse dot -->
    <circle r="5" fill="#c43c2c">
      <animateMotion dur="9s" repeatCount="indefinite" keyTimes="0;0.05;0.45;1" keyPoints="0;0;1;1">
        <mpath href="#median"/>
      </animateMotion>
    </circle>
  </g>

  <!-- RIGHT side panel — info -->
  <g transform="translate(500 90)">
    <text x="0" y="0" class="lbl-bold">Course (C6–T1)</text>
    <text x="0" y="22" class="lbl">Medial + lateral cord → medial to brachial artery</text>
    <text x="0" y="38" class="lbl">→ cubital fossa → between heads of pronator teres</text>
    <text x="0" y="54" class="lbl">→ down between FDS and FDP → carpal tunnel</text>

    <text x="0" y="100" class="lbl-bold">Motor — LOAF</text>
    <g class="lbl">
      <text x="0" y="122"><tspan font-weight="700" fill="#c43c2c">L</tspan>umbricals 1 + 2</text>
      <text x="0" y="140"><tspan font-weight="700" fill="#c43c2c">O</tspan>pponens pollicis</text>
      <text x="0" y="158"><tspan font-weight="700" fill="#c43c2c">A</tspan>bductor pollicis brevis</text>
      <text x="0" y="176"><tspan font-weight="700" fill="#c43c2c">F</tspan>lexor pollicis brevis</text>
    </g>

    <text x="0" y="218" class="lbl-bold">Sensory</text>
    <text x="0" y="240" class="lbl">Lateral 3½ fingers (palmar) + thenar</text>

    <!-- CTS box -->
    <g transform="translate(0 280)" opacity="0">
      <animate attributeName="opacity" values="0;0;0;1;1" keyTimes="0;0.55;0.6;0.7;1" dur="9s" repeatCount="indefinite"/>
      <rect width="380" height="120" rx="5" fill="#f3d9d4" stroke="#c43c2c" stroke-width="1.5"/>
      <text x="14" y="22" class="lbl-bold" fill="#c43c2c">Carpal Tunnel Syndrome</text>
      <text x="14" y="44" class="lbl">• Nocturnal paraesthesia · thumb / index / middle</text>
      <text x="14" y="62" class="lbl">• Phalen's (60s wrist flexion) → reproduces tingling</text>
      <text x="14" y="80" class="lbl">• Tinel's at wrist → percussion tingles distally</text>
      <text x="14" y="100" class="lbl-bold" fill="#c43c2c">→ Ape hand: thenar wasting, lost opposition</text>
    </g>
  </g>
  <text x="500" y="585" text-anchor="middle" class="caption">9 flexor tendons + median nerve share the carpal tunnel — swelling compresses the nerve</text>
</svg></div></body></html>
